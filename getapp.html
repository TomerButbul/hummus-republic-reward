<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get the Hummus Republic App</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=switzer@400,600,700,800&display=swap" rel="stylesheet" />
<style>
  :root{ --green:#1C392F; --cream:#faf9f5; --yellow:#F6CA75; --muted:#5C5049; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center;
    background:var(--cream); color:var(--green);
    font-family:"Switzer", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding:40px 26px;
  }
  .wrap{ width:100%; max-width:440px; }
  .mark{
    width:74px; height:74px; border-radius:20px; background:var(--green);
    display:flex; align-items:center; justify-content:center; margin:0 auto 24px;
    box-shadow:0 16px 36px rgba(28,57,47,.3); color:var(--yellow); font-weight:800;
    font-size:30px; letter-spacing:.5px;
  }
  h1{ font-size:clamp(28px,7vw,40px); line-height:1.05; letter-spacing:.5px; text-transform:uppercase; font-weight:800; margin-bottom:12px; }
  p{ font-size:clamp(15px,4.4vw,18px); line-height:1.55; color:var(--muted); margin:0 auto 30px; max-width:380px; }
  .btns{ display:flex; gap:14px; justify-content:center; align-items:center; flex-wrap:wrap; }
  .badge{ display:inline-flex; transition:transform .15s ease; }
  .badge:hover{ transform:translateY(-2px); }
  .badge img{ display:block; }
  #apple img{ height:56px; }
  #google img{ height:82px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark" aria-hidden="true">HR</div>
    <h1>Get the app</h1>
    <p id="msg">Opening the Hummus Republic app… if it doesn't open, tap your store below.</p>
    <div class="btns">
      <a class="badge" id="apple" href="https://apps.apple.com/us/app/hummus-republic-app/id6737941560">
        <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" />
      </a>
      <a class="badge" id="google" href="https://play.google.com/store/apps/details?id=ai.appfront.thehummusrepublic">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" />
      </a>
    </div>
  </div>

  <script>
  (function(){
    var IOS_STORE = "https://apps.apple.com/us/app/hummus-republic-app/id6737941560";
    var PLAY_STORE = "https://play.google.com/store/apps/details?id=ai.appfront.thehummusrepublic";
    var ANDROID_PKG = "ai.appfront.thehummusrepublic";

    // If Appfront gives you an iOS UNIVERSAL LINK for the app, put it here and iOS
    // will open the app directly (instead of the App Store). Leave "" until then.
    var IOS_UNIVERSAL = "";

    var ua = navigator.userAgent || "";
    var isIOS = /iPad|iPhone|iPod/.test(ua) || (/Macintosh/.test(ua) && navigator.maxTouchPoints > 1);
    var isAndroid = /Android/i.test(ua);

    // Preserve any UTM/query params onto the store links so tracking still flows.
    var qs = location.search || "";
    function withQS(u){ return u + (qs ? (u.indexOf("?") === -1 ? qs : "&" + qs.slice(1)) : ""); }

    if (isIOS) {
      document.getElementById("google").classList.add("hidden");
      document.getElementById("apple").href = withQS(IOS_UNIVERSAL || IOS_STORE);
      // Try to open app (universal link) if provided, else send to the App Store.
      location.replace(withQS(IOS_UNIVERSAL || IOS_STORE));
    } else if (isAndroid) {
      document.getElementById("apple").classList.add("hidden");
      document.getElementById("google").href = withQS(PLAY_STORE);
      // Android intent: opens the app if installed, else falls back to Google Play.
      var intent = "intent://#Intent;package=" + ANDROID_PKG +
                   ";S.browser_fallback_url=" + encodeURIComponent(withQS(PLAY_STORE)) + ";end";
      location.replace(intent);
    } else {
      // Desktop: can't open the app — just show both store badges.
      document.getElementById("msg").textContent =
        "Scan or tap to download the Hummus Republic app on your phone.";
      document.getElementById("apple").href = withQS(IOS_STORE);
      document.getElementById("google").href = withQS(PLAY_STORE);
    }
  })();
  </script>
</body>
</html>
